name: Release Nabdhu

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake dmidecode policykit-1 xdotool x11-utils

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Application
        run: cmake --build build --config Release -j$(nproc)

      - name: Package Nabdhu
        run: |
          mkdir -p release_package
          cp build/nabdhu release_package/
          cp resource/NabdhuRedIco.png release_package/nabdhu.png
          
          # Create install.sh
          echo '#!/bin/bash' > release_package/install.sh
          echo 'if [ "$EUID" -ne 0 ]; then echo "Please run with sudo"; exit 1; fi' >> release_package/install.sh
          echo 'echo "Installing Nabdhu..."' >> release_package/install.sh
          echo 'cp nabdhu /usr/local/bin/' >> release_package/install.sh
          echo 'mkdir -p /usr/local/share/icons/hicolor/512x512/apps/' >> release_package/install.sh
          echo 'cp nabdhu.png /usr/local/share/icons/hicolor/512x512/apps/' >> release_package/install.sh
          echo 'mkdir -p /usr/local/share/applications/' >> release_package/install.sh
          echo 'cat << "DESKTOP" > /usr/local/share/applications/nabdhu.desktop' >> release_package/install.sh
          echo '[Desktop Entry]' >> release_package/install.sh
          echo 'Version=1.0' >> release_package/install.sh
          echo 'Name=Nabdhu' >> release_package/install.sh
          echo 'GenericName=System Monitor' >> release_package/install.sh
          echo 'Comment=Manage and monitor system processes and services' >> release_package/install.sh
          echo 'Icon=nabdhu' >> release_package/install.sh
          echo 'Exec=gnome-terminal --geometry=100x30 --class="Nabdhu" --title="Nabdhu" -- /usr/local/bin/nabdhu' >> release_package/install.sh
          echo 'Terminal=false' >> release_package/install.sh
          echo 'Categories=System;Monitor;ConsoleOnly;' >> release_package/install.sh
          echo 'Type=Application' >> release_package/install.sh
          echo 'DESKTOP' >> release_package/install.sh
          echo 'update-desktop-database /usr/local/share/applications/ || true' >> release_package/install.sh
          echo 'rm -f nabdhu nabdhu.png' >> release_package/install.sh
          echo 'echo "Nabdhu installed successfully! The Start Menu will now use the Nabdhu icon."' >> release_package/install.sh
          echo 'echo "Installation files cleaned up. You can safely delete this extracted folder or keep uninstall.sh just in case."' >> release_package/install.sh
          # Create uninstall.sh
          echo '#!/bin/bash' > release_package/uninstall.sh
          echo 'if [ "$EUID" -ne 0 ]; then echo "Please run with sudo"; exit 1; fi' >> release_package/uninstall.sh
          echo 'echo "Uninstalling Nabdhu..."' >> release_package/uninstall.sh
          echo 'rm -f /usr/local/bin/nabdhu' >> release_package/uninstall.sh
          echo 'rm -f /usr/local/share/icons/hicolor/512x512/apps/nabdhu.png' >> release_package/uninstall.sh
          echo 'rm -f /usr/local/share/applications/nabdhu.desktop' >> release_package/uninstall.sh
          echo 'update-desktop-database /usr/local/share/applications/ || true' >> release_package/uninstall.sh
          echo 'echo "Nabdhu uninstalled successfully."' >> release_package/uninstall.sh
          
          cd release_package
          chmod +x nabdhu install.sh uninstall.sh
          tar -czvf ../nabdhu-linux-x86_64.tar.gz *

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: nabdhu-linux-x86_64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
