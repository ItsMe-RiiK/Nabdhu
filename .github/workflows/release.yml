name: Release Nabdhu

on:
  push:
    tags:
      - 'v*' # Push events to matching v*, i.e. v1.0, v20.15.10

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake dmidecode policykit-1 xdotool x11-utils

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build Application
        run: cmake --build build --config Release -j$(nproc)

      - name: Package Nabdhu
        run: |
          mkdir -p release_package
          cp build/nabdhu release_package/
          cp resource/NabdhuRedIco.png release_package/nabdhu.png
          cat << 'EOF' > release_package/install.sh
#!/bin/bash
if [ "$EUID" -ne 0 ]; then echo "Please run with sudo"; exit 1; fi
echo "Installing Nabdhu..."
cp nabdhu /usr/local/bin/
mkdir -p /usr/local/share/icons/hicolor/512x512/apps/
cp nabdhu.png /usr/local/share/icons/hicolor/512x512/apps/
mkdir -p /usr/local/share/applications/
cat << 'DESKTOP' > /usr/local/share/applications/nabdhu.desktop
[Desktop Entry]
Version=1.0
Name=Nabdhu
GenericName=System Monitor
Comment=Manage and monitor system processes and services
Icon=nabdhu
Exec=gnome-terminal --geometry=100x30 --class="Nabdhu" --title="Nabdhu" -- /usr/local/bin/nabdhu
Terminal=false
Categories=System;Monitor;ConsoleOnly;
Type=Application
DESKTOP
update-desktop-database /usr/local/share/applications/ || true
echo "Nabdhu installed successfully! You can now run 'nabdhu' in your terminal or find it in your Start Menu."
EOF
          cat << 'EOF' > release_package/uninstall.sh
#!/bin/bash
if [ "$EUID" -ne 0 ]; then echo "Please run with sudo"; exit 1; fi
echo "Uninstalling Nabdhu..."
rm -f /usr/local/bin/nabdhu
rm -f /usr/local/share/icons/hicolor/512x512/apps/nabdhu.png
rm -f /usr/local/share/applications/nabdhu.desktop
update-desktop-database /usr/local/share/applications/ || true
echo "Nabdhu uninstalled successfully."
EOF
          cd release_package
          chmod +x nabdhu install.sh uninstall.sh
          tar -czvf ../nabdhu-linux-x86_64.tar.gz *

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: nabdhu-linux-x86_64.tar.gz
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
